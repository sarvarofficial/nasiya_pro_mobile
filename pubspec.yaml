name: nasiya_pro
description: "Nasiya Pro — B2B Debt Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Network — retrofit va retrofit_generator versiyalari mos bo'lishi kerak
  dio: ^5.7.0
  # retrofit va retrofit_generator olib tashlandı — manual Dio ishlatiladi
  connectivity_plus: ^6.1.4

  # Local DB
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.31
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Notifications — Firebase keyinroq ulanadi
  # firebase_core: ^3.13.0
  # firebase_messaging: ^15.2.5

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

  # Utils
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.5.1
  path_provider: ^2.1.5
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  drift_dev: ^2.25.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
